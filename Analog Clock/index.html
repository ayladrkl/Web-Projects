<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Analog Saat</title>
  <link rel="stylesheet" type="text/css" href="style.css">

</head>
<body>

  <div class="clock">
  	<img src="clock.png" class="clock-bg" />
    
    <div class="number" style="--i:1"><span>I</span></div>
    <div class="number" style="--i:2"><span>II</span></div>
    <div class="number" style="--i:3"><span>III</span></div>
    <div class="number" style="--i:4"><span>IV</span></div>
    <div class="number" style="--i:5"><span>V</span></div>
    <div class="number" style="--i:6"><span>VI</span></div>
    <div class="number" style="--i:7"><span>VII</span></div>
    <div class="number" style="--i:8"><span>VIII</span></div>
    <div class="number" style="--i:9"><span>IX</span></div>
    <div class="number" style="--i:10"><span>X</span></div>
    <div class="number" style="--i:11"><span>XI</span></div>
    <div class="number" style="--i:12"><span>XII</span></div>

    
    <div class="hand hour" id="hour"></div>
    <div class="hand minute" id="minute"></div>
    <div class="hand second" id="second"></div>

    <div class="center"></div>
  </div>

  <script src="script.js"></script>

</body>
</html>
